name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-Readme.md
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v5
    
    - name: Restore dependencies
      run: |
        dotnet restore fsuipc-test-client
        dotnet restore fsuipc-test-client.Tests
    
    - name: Check formatting
      run: |
        dotnet format fsuipc-test-client  --verify-no-changes --no-restore
        dotnet format fsuipc-test-client.Tests --verify-no-changes --no-restore

    - name: Test
      run: dotnet test fsuipc-test-client.Tests --verbosity normal --no-restore

    - name: Release build
      run: dotnet build fsuipc-test-client -c Release --no-restore

    - name: Archive
      uses: vimtor/action-zip@v1
      with:
        files: fsuipc-test-client\bin\Release\net10.0-windows\ README.md LICENSE.md slc-offsets.csv
        dest: fsuipc-test-client.zip
        recursive: true

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        fail_on_unmatched_files: true
        files: |
          fsuipc-test-client.zip
